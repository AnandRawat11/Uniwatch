# ══════════════════════════════════════════════════════════════════
# Nginx Configuration for Uniwatch
# Place this at: /etc/nginx/sites-available/uniwatch
# Then: sudo ln -s /etc/nginx/sites-available/uniwatch /etc/nginx/sites-enabled/
# Reload:        sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ══════════════════════════════════════════════════════════════════

# ── Block 1: Redirect all HTTP → HTTPS ───────────────────────────
# Every plain HTTP request (port 80) is given a 301 permanent redirect
# to the HTTPS equivalent. The browser cache this, so future requests
# go directly to HTTPS. This is the first line of defence against
# protocol downgrade attempts.
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge (certificate renewal must work over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # For all other paths, redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Block 2: HTTPS Server ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS Certificate (managed by Certbot / Let's Encrypt) ──────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── TLS Hardening ─────────────────────────────────────────────
    # Only allow TLS 1.2 and 1.3 — disables SSLv3, TLS 1.0, TLS 1.1
    # (all vulnerable to POODLE, BEAST, and other MITM attacks).
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites — prefer server order, disables weak ciphers.
    # ECDHE provides Perfect Forward Secrecy (PFS): even if the private key
    # is later compromised, past sessions cannot be decrypted.
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';

    # DH Parameters — use a strong pre-generated DH group for DHE key exchange.
    # Generate with: sudo openssl dhparam -out /etc/nginx/dhparam.pem 4096
    ssl_dhparam /etc/nginx/dhparam.pem;

    # Session caching improves performance while maintaining security.
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # Disable — tickets can undermine PFS

    # OCSP Stapling — allows the server to attach a cached certificate
    # validity response, so clients don't need to contact the CA directly.
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ──────────────────────────────────────────
    # HSTS: Tell browsers to ONLY connect over HTTPS for 1 year.
    # includeSubDomains: also covers api.yourdomain.com
    # preload: opt into the browser HSTS preload list.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Block this site from being embedded in iframes (clickjacking).
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing.
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information sent to external sites.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy — restrict access to sensitive browser APIs.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy — whitelist allowed content sources.
    # Tune this to match CDN sources used (Chart.js, Google Fonts, etc.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # ── Static Files ─────────────────────────────────────────────
    # Nginx serves static files directly — much faster than Django doing it.
    # Run: python manage.py collectstatic  to populate this directory.
    location /static/ {
        alias /home/ubuntu/univatch/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Proxy to Gunicorn (Django) ────────────────────────────────
    # All other requests are forwarded to the Django app running on Gunicorn.
    # Gunicorn should be listening on a Unix socket or local port.
    location / {
        proxy_pass http://unix:/run/gunicorn/univatch.sock;
        # Alternative TCP socket: proxy_pass http://127.0.0.1:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # CRITICAL: Tell Django the original request was HTTPS.
        # Django reads SECURE_PROXY_SSL_HEADER to trust this header.
        # Without this, Django thinks the request is HTTP and SECURE_SSL_REDIRECT
        # causes an infinite redirect loop.
        proxy_set_header X-Forwarded-Proto https;

        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    # ── Gunicorn Socket (Unix socket variant config) ──────────────
    # Make sure Gunicorn is started with:
    #   gunicorn Uniwatch.wsgi:application \
    #       --bind unix:/run/gunicorn/univatch.sock \
    #       --workers 3 \
    #       --timeout 60
}
